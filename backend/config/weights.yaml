# ======================================
# 🐾 반려동물 산책 루트 가중치 설정
# ======================================
# 값이 클수록 해당 요소를 더 강하게 기피합니다
# 1.0 미만은 보너스(선호), 1.0 초과는 페널티(기피)
# 기본 비용 = edge_length(m) × (각 penalty 곱)

# --- 도로 유형별 페널티 승수 ---
highway_penalty:
  # 보행 전용 (가장 선호)
  footway: 1.0
  pedestrian: 1.0
  living_street: 1.1 # 생활도로
  track: 1.1 # 비포장 산책로
  service: 1.2
  residential: 1.3
  # 일반 도로 (가급적 피함)
  tertiary: 2.0
  secondary: 3.0
  primary: 5.0
  # 계단 (완전 배제 대상이나 가중치도 높임)
  steps: 99.0
  # 그 외
  unknown: 1.2

# --- 도로 폭(width)에 따른 페널티 (단순화) ---
width_penalty:
  narrow_threshold_m: 1.0
  narrow_multiplier: 1.0 # 좁은 길 페널티 제거 (단순화)
  no_data_multiplier: 1.0

# --- 노면(surface) 선호도 (단순화) ---
surface_penalty:
  # 모든 노면을 1.0으로 초기화하여 불필요한 우회 방지
  asphalt: 1.0
  paving_stones: 1.0
  concrete: 1.0
  paved: 1.0
  rubber: 0.9 # 약간의 선호만 유지
  tartan: 0.9
  urethane: 0.9
  wood: 1.0
  ground: 1.0
  compacted: 1.0
  dirt: 1.0
  earth: 1.0
  cobblestone: 1.2 # 아주 나쁜 길만 약간 기피
  unknown: 1.0

# --- 계단(stairs) 오버레이 ---
stairs_penalty:
  buffer_m: 10
  multiplier: 10.0 # 계단 주변 페널티 강화

# --- 공원/놀이터 보너스 ---
leisure_bonus:
  park_radius_m: 150
  park_multiplier: 0.8
  dog_park_radius_m: 250
  dog_park_multiplier: 0.7

# --- 루프 경로 생성 파라미터 ---
loop:
  max_waypoints: 4 # 경유지 최대 수 (클수록 복잡)
  min_waypoints: 0 # 경유지 최소 수
  shape_regularity: 0.7 # 0~1, 1에 가까울수록 원형에 가까운 루프
  revisit_penalty: 999999 # 왔던 길 다시 가는 것 방지
  num_candidates: 80 # 후보 경로 생성 시도 횟수
  walking_speed_mps: 1.0 # 산책 속도 (m/s), 기본 시속 3.6km/h

# --- 시나리오1 완화 임계치 ---
scenario1:
  steep_limit: 5 # 급경사 허용 개수
  stairs_limit: 5 # 계단 허용 개수
